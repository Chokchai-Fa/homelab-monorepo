# nginx config for the statically-built Docusaurus site.
# Docusaurus produces real .html files per route, so a plain file server works;
# the try_files fallback covers trailing-slash / client-navigated paths, and a
# custom 404 uses Docusaurus's generated 404.html.
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip static assets (Docusaurus JS/CSS bundles are large).
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # Long-cache the hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    error_page 404 /404.html;

    # Health endpoint for the k8s probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
