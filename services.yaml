  - name: worker-reminder-scheduler
    image: worker-reminder-scheduler
    context: services/worker-reminder-scheduler
    dockerfile: build/go/Dockerfile
    versionFile: services/worker-reminder-scheduler/VERSION
    platforms: linux/amd64,linux/arm64
    buildArgs:
      GO_VERSION: "1.25"
      MAIN_PATH: "./"
      PORT: "8080"
    test: "go test ./..."
    paths:
      - "services/worker-reminder-scheduler/**"
      - "build/go/**"

  - name: subscriber-reminder-notifier
    image: subscriber-reminder-notifier
    context: services/subscriber-reminder-notifier
