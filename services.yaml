      MAIN_PATH: "./"
      PORT: "8080"
    test: "go test ./..."
    paths:
      - "services/consumer-llm-processor/**"
      - "build/go/**"

  - name: consumer-reply-line-user
    image: consumer-reply-line-user
    context: services/consumer-reply-line-user
    dockerfile: build/go/Dockerfile
    versionFile: services/consumer-reply-line-user/VERSION
    platforms: linux/amd64,linux/arm64
    buildArgs:
      GO_VERSION: "1.25"
      MAIN_PATH: "./"
      PORT: "8080"
    test: "go test ./..."
    paths:
